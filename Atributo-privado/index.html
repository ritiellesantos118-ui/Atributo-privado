<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema de Login</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .card { border: 1px solid #f337ca; padding: 20px; border-radius: 8px; box-shadow: 2px 2px 10px rgba(10, 10, 10, 0.1); }
        input { display: block; margin-bottom: 10px; padding: 8px; width: 200px; }
        button { padding: 10px; cursor: pointer; background-color: #f89ff1; color: rgb(235, 4, 177); border: none; border-radius: 4px; }
        #mensagem { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>LOGIN</h2>
        <input type="text" id="inputNome" placeholder="Nome de usuário">
        <input type="password" id="inputSenha" placeholder="Digite a senha">
        <button onclick="realizarLogin()">Entrar</button>
        <p id="mensagem"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
